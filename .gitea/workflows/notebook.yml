name: Notebook Validation
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'notebooks/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'notebooks/**'

jobs:
  notebook-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter nbconvert pytest-nbval
    
    - name: Validate notebooks
      run: |
        # Check if notebooks can be executed without errors
        jupyter nbconvert --to notebook --execute notebooks/probabilidad_exploracion.ipynb --output-dir=./temp_notebooks
        
    - name: Test notebook execution
      run: |
        python -c "
        import nbformat
        from nbconvert.preprocessors import ExecutePreprocessor
        
        # Load the notebook
        with open('notebooks/probabilidad_exploracion.ipynb', 'r') as f:
            nb = nbformat.read(f, as_version=4)
        
        # Execute the notebook
        ep = ExecutePreprocessor(timeout=600, kernel_name='python3')
        ep.preprocess(nb, {'metadata': {'path': 'notebooks/'}})
        
        print('Notebook executed successfully!')
        "
    
    - name: Clean up
      if: always()
      run: |
        rm -rf temp_notebooks
