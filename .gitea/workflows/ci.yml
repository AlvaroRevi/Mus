name: Continuous Integration
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black isort mypy bandit safety
    
    - name: Code formatting check
      run: |
        black --check --diff .
        isort --check-only --diff .
    
    - name: Lint code
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type checking
      run: |
        mypy src/ --ignore-missing-imports
    
    - name: Security checks
      run: |
        bandit -r src/ -ll
        safety check
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-fail-under=80
    
    - name: Test GUI import
      run: |
        python -c "
        import sys
        sys.path.append('src')
        try:
            from main import MusGUI
            print('GUI import successful')
        except ImportError as e:
            print(f'GUI import failed: {e}')
            # This is expected in headless environments
            pass
        "
    
    - name: Test data loading
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from models.mus_game import MusGame
        game = MusGame()
        print(f'Loaded {len(game.matriz_probabilidades)} hands')
        print('Data loading successful')
        "
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 7
